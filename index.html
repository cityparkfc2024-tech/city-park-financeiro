<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Park F.C - Gestão</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background: #0a1628;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- CONFIGURAÇÕES INICIAIS ---
        const JOGADORES_INICIAIS = [
            "Geanso", "Daniel", "Rodrigo", "Wila", "Carlos", "Lucena",
            "Caio", "Ramon", "José", "Everson", "Neto", "Gustavo",
            "Luciano", "Tiago", "Luiz", "Pedro", "Ismael"
        ];

        const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        const MESES_FULL = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        const ANO_ATUAL = 2026;
        const MES_ATUAL = 4; // Maio (baseado no seu código anterior)
        const MENSALIDADE = 70;
        const STORAGE_KEY = "citypark_fc_data";

        // --- FUNÇÕES DE AUXÍLIO ---
        const defaultState = () => ({
            jogadores: JOGADORES_INICIAIS,
            pagamentos: {},
            despesas: [],
            mesAtivo: MES_ATUAL,
            anoAtivo: ANO_ATUAL,
        });

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    return { ...defaultState(), ...parsed };
                }
            } catch (e) { console.error("Erro ao carregar dados", e); }
            return defaultState();
        }

        function saveState(state) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    jogadores: state.jogadores,
                    pagamentos: state.pagamentos,
                    despesas: state.despesas,
                }));
            } catch (e) { console.error("Erro ao salvar dados", e); }
        }

        function pagKey(nome, mes, ano) {
            return `${nome}_${mes}_${ano}`;
        }

        // --- COMPONENTE PRINCIPAL ---
        function CityParkFC() {
            const [state, setState] = useState(loadState);
            const [tab, setTab] = useState("mensalidades");
            const [copied, setCopied] = useState(false);
            const [novaDesc, setNovaDesc] = useState("");
            const [novoValor, setNovoValor] = useState("");
            const [novaData, setNovaData] = useState("");
            const [novoJogadorInput, setNovoJogadorInput] = useState("");
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [showWhatsApp, setShowWhatsApp] = useState(false);

            useEffect(() => { saveState(state); }, [state]);

            const { jogadores, pagamentos, despesas, mesAtivo, anoAtivo } = state;

            const togglePagamento = useCallback((nome) => {
                const key = pagKey(nome, mesAtivo, anoAtivo);
                setState(prev => {
                    const atual = prev.pagamentos[key];
                    const hoje = new Date();
                    const dataStr = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}`;
                    return {
                        ...prev,
                        pagamentos: {
                            ...prev.pagamentos,
                            [key]: atual?.pago
                                ? { pago: false, valor: 0, data: "" }
                                : { pago: true, valor: MENSALIDADE, data: dataStr }
                        }
                    };
                });
            }, [mesAtivo, anoAtivo]);

            const getPag = (nome, mes, ano) => pagamentos[pagKey(nome, mes, ano)] || { pago: false, valor: 0, data: "" };

            const pagantes = jogadores.filter(n => getPag(n, mesAtivo, anoAtivo).pago);
            const devedores = jogadores.filter(n => !getPag(n, mesAtivo, anoAtivo).pago);
            const totalRecebido = pagantes.reduce((s, n) => s + (getPag(n, mesAtivo, anoAtivo).valor || MENSALIDADE), 0);
            const despesasMes = despesas.filter(d => d.mes === mesAtivo && d.ano === anoAtivo);
            const totalDespesas = despesasMes.reduce((s, d) => s + d.valor, 0);
            const saldo = totalRecebido - totalDespesas;

            const adicionarDespesa = () => {
                if (!novaDesc || !novoValor) return;
                setState(prev => ({
                    ...prev,
                    despesas: [...prev.despesas, {
                        id: Date.now(),
                        descricao: novaDesc,
                        valor: parseFloat(novoValor),
                        data: novaData || `${String(new Date().getDate()).padStart(2,'0')}/${String(new Date().getMonth()+1).padStart(2,'0')}`,
                        mes: mesAtivo,
                        ano: anoAtivo,
                    }]
                }));
                setNovaDesc(""); setNovoValor(""); setNovaData("");
            };

            const removerDespesa = (id) => {
                setState(prev => ({ ...prev, despesas: prev.despesas.filter(d => d.id !== id) }));
                setConfirmDelete(null);
            };

            const adicionarJogador = () => {
                const nome = novoJogadorInput.trim();
                if (!nome || jogadores.includes(nome)) return;
                setState(prev => ({ ...prev, jogadores: [...prev.jogadores, nome] }));
                setNovoJogadorInput("");
            };

            const gerarMensagemWhatsApp = () => {
                const mesNome = MESES_FULL[mesAtivo];
                const hoje = new Date();
                const dataHoje = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}`;
                let msg = `⚽ *CITY PARK F.C* ⚽\n`;
                msg += `📋 *Mensalidades - ${mesNome}/${anoAtivo}*\n`;
                msg += `📅 Atualizado em ${dataHoje}\n`;
                msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
                msg += `✅ *PAGAMENTOS CONFIRMADOS (${pagantes.length})*\n`;
                pagantes.forEach(n => {
                    const p = getPag(n, mesAtivo, anoAtivo);
                    msg += `  • ${n} — R$ ${p.valor || MENSALIDADE},00${p.data ? ` (${p.data})` : ""}\n`;
                });
                msg += `\n`;
                if (devedores.length > 0) {
                    msg += `❌ *PENDENTES (${devedores.length})*\n`;
                    devedores.forEach(n => { msg += `  • ${n}\n`; });
                    msg += `\n`;
                }
                msg += `━━━━━━━━━━━━━━━━━━━━\n`;
                msg += `💰 *Total arrecadado:* R$ ${totalRecebido.toLocaleString('pt-BR')},00\n`;
                msg += `📊 *Despesas do mês:* R$ ${totalDespesas.toLocaleString('pt-BR')},00\n`;
                msg += `🏦 *Saldo:* R$ ${saldo.toLocaleString('pt-BR')},00\n\n`;
                msg += `_Mensalidade: R$ 70,00/mês_\n`;
                msg += `_Pix/Transferência: Conta Sicredi_`;
                return msg;
            };

            const copiarMensagem = () => {
                navigator.clipboard.writeText(gerarMensagemWhatsApp()).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const fmt = (v) => `R$ ${Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

            return (
                <div style={{
                    minHeight: "100vh",
                    background: "linear-gradient(135deg, #0a1628 0%, #0d2040 50%, #0a1628 100%)",
                    fontFamily: "sans-serif",
                    color: "#e8f0fe",
                    paddingBottom: "40px"
                }}>
                    <div style={{ maxWidth: 720, margin: "0 auto", padding: "20px 16px" }}>
                        
                        {/* Header */}
                        <div style={{ textAlign: "center", marginBottom: 28 }}>
                            <div style={{ fontSize: 40 }}>⚽</div>
                            <h1 style={{ margin: 0, color: "#22c55e", fontSize: 24, letterSpacing: 1 }}>CITY PARK F.C</h1>
                            <p style={{ color: "#64748b", fontSize: 11 }}>MARABÁ – PARÁ • GESTÃO {anoAtivo}</p>
                        </div>

                        {/* Seletor de Mês */}
                        <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: 12, marginBottom: 20 }}>
                            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", justifyContent: "center" }}>
                                {MESES.map((m, i) => (
                                    <button key={i} onClick={() => setState(prev => ({ ...prev, mesAtivo: i }))}
                                        style={{
                                            padding: "6px 10px", borderRadius: 8, border: "none",
                                            background: mesAtivo === i ? "#22c55e" : "transparent",
                                            color: mesAtivo === i ? "#fff" : "#94a3b8",
                                            fontSize: 12, fontWeight: "bold", cursor: "pointer"
                                        }}>{m}</button>
                                ))}
                            </div>
                        </div>

                        {/* Resumo */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
                            <div style={{ background: "rgba(34,197,94,0.1)", padding: 10, borderRadius: 10, textAlign: "center", border: "1px solid rgba(34,197,94,0.2)" }}>
                                <div style={{ fontSize: 10, color: "#22c55e" }}>ENTRADAS</div>
                                <div style={{ fontWeight: "bold", fontSize: 14 }}>{fmt(totalRecebido)}</div>
                            </div>
                            <div style={{ background: "rgba(239,68,68,0.1)", padding: 10, borderRadius: 10, textAlign: "center", border: "1px solid rgba(239,68,68,0.2)" }}>
                                <div style={{ fontSize: 10, color: "#ef4444" }}>SAÍDAS</div>
                                <div style={{ fontWeight: "bold", fontSize: 14 }}>{fmt(totalDespesas)}</div>
                            </div>
                            <div style={{ background: "rgba(255,255,255,0.05)", padding: 10, borderRadius: 10, textAlign: "center", border: "1px solid rgba(255,255,255,0.1)" }}>
                                <div style={{ fontSize: 10, color: "#94a3b8" }}>SALDO</div>
                                <div style={{ fontWeight: "bold", fontSize: 14, color: saldo >= 0 ? "#22c55e" : "#ef4444" }}>{fmt(saldo)}</div>
                            </div>
                        </div>

                        {/* Menu Tabs */}
                        <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                            <button onClick={() => setTab("mensalidades")} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: tab === "mensalidades" ? "#22c55e" : "#1e293b", color: "#fff", fontWeight: "bold" }}>Mensalidade</button>
                            <button onClick={() => setTab("despesas")} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: tab === "despesas" ? "#ef4444" : "#1e293b", color: "#fff", fontWeight: "bold" }}>Despesas</button>
                            <button onClick={() => setTab("jogadores")} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: tab === "jogadores" ? "#3b82f6" : "#1e293b", color: "#fff", fontWeight: "bold" }}>Elenco</button>
                        </div>

                        {/* Conteúdo Mensalidades */}
                        {tab === "mensalidades" && (
                            <div>
                                {jogadores.map(nome => {
                                    const p = getPag(nome, mesAtivo, anoAtivo);
                                    return (
                                        <div key={nome} onClick={() => togglePagamento(nome)} style={{
                                            background: "rgba(255,255,255,0.03)", marginBottom: 8, padding: 12, borderRadius: 12,
                                            display: "flex", justifyContent: "space-between", alignItems: "center", border: p.pago ? "1px solid #22c55e" : "1px solid transparent"
                                        }}>
                                            <span>{nome}</span>
                                            <span style={{ color: p.pago ? "#22c55e" : "#475569", fontWeight: "bold" }}>
                                                {p.pago ? "✓ Pago" : "Pendente"}
                                            </span>
                                        </div>
                                    );
                                })}
                                <button onClick={() => setShowWhatsApp(!showWhatsApp)} style={{ width: "100%", padding: 15, borderRadius: 12, background: "#25d366", color: "#fff", border: "none", fontWeight: "bold", marginTop: 10 }}>📱 Gerar Lista WhatsApp</button>
                                {showWhatsApp && (
                                    <div style={{ background: "#000", padding: 15, borderRadius: 12, marginTop: 10 }}>
                                        <pre style={{ fontSize: 11, whiteSpace: "pre-wrap" }}>{gerarMensagemWhatsApp()}</pre>
                                        <button onClick={copiarMensagem} style={{ width: "100%", padding: 10, background: "#22c55e", border: "none", color: "#fff", borderRadius: 8 }}>{copied ? "Copiado!" : "Copiar Texto"}</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Conteúdo Despesas */}
                        {tab === "despesas" && (
                            <div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                                    <input placeholder="Descrição" value={novaDesc} onChange={e => setNovaDesc(e.target.value)} style={{ padding: 12, borderRadius: 8, border: "none", background: "#1e293b", color: "#fff" }} />
                                    <input placeholder="Valor R$" type="number" value={novoValor} onChange={e => setNovoValor(e.target.value)} style={{ padding: 12, borderRadius: 8, border: "none", background: "#1e293b", color: "#fff" }} />
                                    <button onClick={adicionarDespesa} style={{ padding: 12, borderRadius: 8, background: "#ef4444", color: "#fff", border: "none", fontWeight: "bold" }}>+ Adicionar Despesa</button>
                                </div>
                                {despesasMes.map(d => (
                                    <div key={d.id} style={{ display: "flex", justifyContent: "space-between", padding: 10, background: "rgba(239,68,68,0.1)", borderRadius: 10, marginBottom: 5 }}>
                                        <span>{d.descricao}</span>
                                        <span style={{ color: "#ef4444", fontWeight: "bold" }}>-{fmt(d.valor)}</span>
                                        <button onClick={() => removerDespesa(d.id)} style={{ background: "none", border: "none", color: "#64748b" }}>🗑</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Conteúdo Elenco */}
                        {tab === "jogadores" && (
                            <div>
                                <div style={{ display: "flex", gap: 5, marginBottom: 20 }}>
                                    <input placeholder="Novo Jogador" value={novoJogadorInput} onChange={e => setNovoJogadorInput(e.target.value)} style={{ flex: 1, padding: 12, borderRadius: 8, border: "none", background: "#1e293b", color: "#fff" }} />
                                    <button onClick={adicionarJogador} style={{ padding: 12, borderRadius: 8, background: "#3b82f6", color: "#fff", border: "none" }}>+</button>
                                </div>
                                {jogadores.map((n, i) => (
                                    <div key={n} style={{ padding: 10, borderBottom: "1px solid #1e293b" }}>{i + 1}. {n}</div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CityParkFC />);
    </script>
</body>
</html>
