<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Park F.C - Gestão</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">

const JOGADORES_INICIAIS = [
  "Geanso", "Daniel", "Rodrigo", "Wila", "Carlos", "Lucena",
  "Caio", "Ramon", "José", "Everson", "Neto", "Gustavo",
  "Luciano", "Tiago", "Luiz", "Pedro", "Ismael"
];

const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const ANO_ATUAL = 2026;
const MES_ATUAL = 4; // Maio (0-indexed)
const MENSALIDADE = 70;

const STORAGE_KEY = "citypark_fc_data";

const defaultState = () => ({
  jogadores: JOGADORES_INICIAIS,
  pagamentos: {}, // { "Nome_Mes_Ano": { pago: bool, valor: number, data: string } }
  despesas: [], // { id, descricao, valor, data, mes, ano }
  novoJogador: "",
  mesAtivo: MES_ATUAL,
  anoAtivo: ANO_ATUAL,
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...defaultState(), ...parsed };
    }
  } catch {}
  return defaultState();
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      jogadores: state.jogadores,
      pagamentos: state.pagamentos,
      despesas: state.despesas,
    }));
  } catch {}
}

function pagKey(nome, mes, ano) {
  return `${nome}_${mes}_${ano}`;
}

export default function CityParkFC() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("mensalidades");
  const [copied, setCopied] = useState(false);
  const [novaDesc, setNovaDesc] = useState("");
  const [novoValor, setNovoValor] = useState("");
  const [novaData, setNovaData] = useState("");
  const [novoJogadorInput, setNovoJogadorInput] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [showWhatsApp, setShowWhatsApp] = useState(false);

  useEffect(() => { saveState(state); }, [state]);

  const { jogadores, pagamentos, despesas, mesAtivo, anoAtivo } = state;

  const togglePagamento = useCallback((nome) => {
    const key = pagKey(nome, mesAtivo, anoAtivo);
    setState(prev => {
      const atual = prev.pagamentos[key];
      const hoje = new Date();
      const dataStr = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}`;
      return {
        ...prev,
        pagamentos: {
          ...prev.pagamentos,
          [key]: atual?.pago
            ? { pago: false, valor: 0, data: "" }
            : { pago: true, valor: MENSALIDADE, data: dataStr }
        }
      };
    });
  }, [mesAtivo, anoAtivo]);

  const getPag = (nome, mes, ano) => pagamentos[pagKey(nome, mes, ano)] || { pago: false, valor: 0, data: "" };

  const pagantes = jogadores.filter(n => getPag(n, mesAtivo, anoAtivo).pago);
  const devedores = jogadores.filter(n => !getPag(n, mesAtivo, anoAtivo).pago);
  const totalRecebido = pagantes.reduce((s, n) => s + (getPag(n, mesAtivo, anoAtivo).valor || MENSALIDADE), 0);

  const despesasMes = despesas.filter(d => d.mes === mesAtivo && d.ano === anoAtivo);
  const totalDespesas = despesasMes.reduce((s, d) => s + d.valor, 0);
  const saldo = totalRecebido - totalDespesas;

  const adicionarDespesa = () => {
    if (!novaDesc || !novoValor) return;
    setState(prev => ({
      ...prev,
      despesas: [...prev.despesas, {
        id: Date.now(),
        descricao: novaDesc,
        valor: parseFloat(novoValor),
        data: novaData || `${String(new Date().getDate()).padStart(2,'0')}/${String(new Date().getMonth()+1).padStart(2,'0')}`,
        mes: mesAtivo,
        ano: anoAtivo,
      }]
    }));
    setNovaDesc(""); setNovoValor(""); setNovaData("");
  };

  const removerDespesa = (id) => {
    setState(prev => ({ ...prev, despesas: prev.despesas.filter(d => d.id !== id) }));
    setConfirmDelete(null);
  };

  const adicionarJogador = () => {
    const nome = novoJogadorInput.trim();
    if (!nome || jogadores.includes(nome)) return;
    setState(prev => ({ ...prev, jogadores: [...prev.jogadores, nome] }));
    setNovoJogadorInput("");
  };

  const gerarMensagemWhatsApp = () => {
    const mesNome = MESES_FULL[mesAtivo];
    const hoje = new Date();
    const dataHoje = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}`;
    let msg = `⚽ *CITY PARK F.C* ⚽\n`;
    msg += `📋 *Mensalidades - ${mesNome}/${anoAtivo}*\n`;
    msg += `📅 Atualizado em ${dataHoje}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
    msg += `✅ *PAGAMENTOS CONFIRMADOS (${pagantes.length})*\n`;
    pagantes.forEach(n => {
      const p = getPag(n, mesAtivo, anoAtivo);
      msg += `  • ${n} — R$ ${p.valor || MENSALIDADE},00${p.data ? ` (${p.data})` : ""}\n`;
    });
    msg += `\n`;
    if (devedores.length > 0) {
      msg += `❌ *PENDENTES (${devedores.length})*\n`;
      devedores.forEach(n => { msg += `  • ${n}\n`; });
      msg += `\n`;
    }
    msg += `━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `💰 *Total arrecadado:* R$ ${totalRecebido.toLocaleString('pt-BR')},00\n`;
    msg += `📊 *Despesas do mês:* R$ ${totalDespesas.toLocaleString('pt-BR')},00\n`;
    msg += `🏦 *Saldo:* R$ ${saldo.toLocaleString('pt-BR')},00\n\n`;
    msg += `_Mensalidade: R$ 70,00/mês_\n`;
    msg += `_Pix/Transferência: Conta Sicredi_`;
    return msg;
  };

  const copiarMensagem = () => {
    navigator.clipboard.writeText(gerarMensagemWhatsApp()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const fmt = (v) => `R$ ${Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #0a1628 0%, #0d2040 50%, #0a1628 100%)",
      fontFamily: "'Trebuchet MS', 'Segoe UI', sans-serif",
      color: "#e8f0fe",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Background pattern */}
      <div style={{
        position: "fixed", inset: 0, zIndex: 0,
        backgroundImage: `radial-gradient(circle at 20% 30%, rgba(0,180,100,0.07) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(0,120,255,0.07) 0%, transparent 50%)`,
        pointerEvents: "none",
      }} />

      <div style={{ position: "relative", zIndex: 1, maxWidth: 720, margin: "0 auto", padding: "20px 16px 40px" }}>

        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 48, marginBottom: 4 }}>⚽</div>
          <h1 style={{
            fontSize: 26, fontWeight: 900, letterSpacing: 2,
            background: "linear-gradient(90deg, #22c55e, #4ade80, #22c55e)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            margin: 0, textTransform: "uppercase",
          }}>City Park F.C</h1>
          <p style={{ color: "#64748b", fontSize: 12, marginTop: 2, letterSpacing: 1 }}>MARABÁ – PARÁ • GESTÃO FINANCEIRA {anoAtivo}</p>
        </div>

        {/* Seletor de Mês */}
        <div style={{
          background: "rgba(255,255,255,0.04)", borderRadius: 16,
          border: "1px solid rgba(255,255,255,0.08)", padding: "12px 16px", marginBottom: 20,
          display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",
        }}>
          <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>Mês:</span>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {MESES.map((m, i) => (
              <button key={i} onClick={() => setState(prev => ({ ...prev, mesAtivo: i }))}
                style={{
                  padding: "5px 12px", borderRadius: 20, border: "none", cursor: "pointer",
                  fontSize: 12, fontWeight: 700,
                  background: mesAtivo === i ? "linear-gradient(135deg,#22c55e,#16a34a)" : "rgba(255,255,255,0.06)",
                  color: mesAtivo === i ? "#fff" : "#94a3b8",
                  transition: "all 0.2s",
                }}>
                {m}
              </button>
            ))}
          </div>
        </div>

        {/* Cards de resumo */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
          {[
            { label: "Arrecadado", valor: fmt(totalRecebido), icon: "💚", cor: "#22c55e" },
            { label: "Despesas", valor: fmt(totalDespesas), icon: "🔴", cor: "#ef4444" },
            { label: "Saldo", valor: fmt(saldo), icon: saldo >= 0 ? "🏦" : "⚠️", cor: saldo >= 0 ? "#22c55e" : "#f59e0b" },
          ].map((c, i) => (
            <div key={i} style={{
              background: "rgba(255,255,255,0.04)", borderRadius: 14,
              border: `1px solid ${c.cor}33`, padding: "14px 12px", textAlign: "center",
            }}>
              <div style={{ fontSize: 20, marginBottom: 4 }}>{c.icon}</div>
              <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>{c.label}</div>
              <div style={{ fontSize: 15, fontWeight: 900, color: c.cor, marginTop: 2 }}>{c.valor}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {[
            { id: "mensalidades", label: "💰 Mensalidades" },
            { id: "despesas", label: "📊 Despesas" },
            { id: "jogadores", label: "👥 Jogadores" },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, padding: "10px 6px", borderRadius: 12, border: "none", cursor: "pointer",
              fontSize: 12, fontWeight: 700,
              background: tab === t.id ? "linear-gradient(135deg,#22c55e,#16a34a)" : "rgba(255,255,255,0.06)",
              color: tab === t.id ? "#fff" : "#94a3b8",
              transition: "all 0.2s",
            }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* TAB: MENSALIDADES */}
        {tab === "mensalidades" && (
          <div>
            <div style={{ marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 12, color: "#94a3b8" }}>
                <span style={{ color: "#22c55e", fontWeight: 700 }}>{pagantes.length} pagos</span>
                {" · "}
                <span style={{ color: "#ef4444", fontWeight: 700 }}>{devedores.length} pendentes</span>
                {" · "}Total {jogadores.length}
              </div>
              <div style={{ fontSize: 11, color: "#64748b" }}>Toque para marcar ✓</div>
            </div>

            {/* Lista de jogadores */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
              {jogadores.map(nome => {
                const p = getPag(nome, mesAtivo, anoAtivo);
                return (
                  <div key={nome} onClick={() => togglePagamento(nome)} style={{
                    background: p.pago
                      ? "linear-gradient(135deg, rgba(34,197,94,0.15), rgba(22,163,74,0.08))"
                      : "rgba(255,255,255,0.04)",
                    border: p.pago ? "1px solid rgba(34,197,94,0.4)" : "1px solid rgba(255,255,255,0.07)",
                    borderRadius: 12, padding: "12px 16px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    cursor: "pointer", transition: "all 0.2s",
                    userSelect: "none",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: "50%",
                        background: p.pago ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.07)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 16, fontWeight: 900,
                        color: p.pago ? "#22c55e" : "#475569",
                      }}>
                        {p.pago ? "✓" : nome.charAt(0).toUpperCase()}
                      </div>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14, color: p.pago ? "#e8f0fe" : "#94a3b8" }}>{nome}</div>
                        {p.pago && p.data && <div style={{ fontSize: 11, color: "#22c55e", opacity: 0.8 }}>Pago em {p.data}</div>}
                        {!p.pago && <div style={{ fontSize: 11, color: "#ef4444", opacity: 0.7 }}>Pendente</div>}
                      </div>
                    </div>
                    <div style={{
                      fontWeight: 900, fontSize: 14,
                      color: p.pago ? "#22c55e" : "#475569",
                    }}>
                      {p.pago ? `R$ ${p.valor || MENSALIDADE},00` : "—"}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Botão WhatsApp */}
            <button onClick={() => setShowWhatsApp(!showWhatsApp)} style={{
              width: "100%", padding: "14px", borderRadius: 14, border: "none", cursor: "pointer",
              background: "linear-gradient(135deg, #25d366, #128c7e)",
              color: "#fff", fontSize: 15, fontWeight: 800,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              marginBottom: showWhatsApp ? 12 : 0,
            }}>
              📱 Gerar Mensagem para WhatsApp
            </button>

            {showWhatsApp && (
              <div style={{
                background: "rgba(37,211,102,0.06)", border: "1px solid rgba(37,211,102,0.2)",
                borderRadius: 14, padding: 16,
              }}>
                <pre style={{
                  fontSize: 12, lineHeight: 1.7, color: "#cbd5e1", whiteSpace: "pre-wrap",
                  margin: 0, marginBottom: 12, fontFamily: "monospace",
                }}>
                  {gerarMensagemWhatsApp()}
                </pre>
                <button onClick={copiarMensagem} style={{
                  width: "100%", padding: "11px", borderRadius: 10, border: "none", cursor: "pointer",
                  background: copied ? "linear-gradient(135deg,#22c55e,#16a34a)" : "rgba(37,211,102,0.15)",
                  color: copied ? "#fff" : "#22c55e", fontSize: 13, fontWeight: 800,
                  transition: "all 0.3s",
                }}>
                  {copied ? "✓ Copiado! Cole no WhatsApp" : "📋 Copiar Mensagem"}
                </button>
              </div>
            )}
          </div>
        )}

        {/* TAB: DESPESAS */}
        {tab === "despesas" && (
          <div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>
                Nova Despesa — {MESES_FULL[mesAtivo]}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <input
                  placeholder="Descrição (ex: Aluguel Arena Bob)"
                  value={novaDesc}
                  onChange={e => setNovaDesc(e.target.value)}
                  style={{
                    background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
                    borderRadius: 10, padding: "10px 14px", color: "#e8f0fe", fontSize: 13, outline: "none",
                  }}
                />
                <div style={{ display: "flex", gap: 8 }}>
                  <input
                    placeholder="Valor (R$)"
                    type="number"
                    value={novoValor}
                    onChange={e => setNovoValor(e.target.value)}
                    style={{
                      flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
                      borderRadius: 10, padding: "10px 14px", color: "#e8f0fe", fontSize: 13, outline: "none",
                    }}
                  />
                  <input
                    placeholder="Data (dd/mm)"
                    value={novaData}
                    onChange={e => setNovaData(e.target.value)}
                    style={{
                      flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
                      borderRadius: 10, padding: "10px 14px", color: "#e8f0fe", fontSize: 13, outline: "none",
                    }}
                  />
                </div>
                <button onClick={adicionarDespesa} style={{
                  padding: "11px", borderRadius: 10, border: "none", cursor: "pointer",
                  background: "linear-gradient(135deg,#ef4444,#dc2626)", color: "#fff", fontSize: 13, fontWeight: 800,
                }}>
                  + Adicionar Despesa
                </button>
              </div>
            </div>

            <div style={{ fontSize: 12, color: "#64748b", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
              Despesas de {MESES_FULL[mesAtivo]} ({despesasMes.length})
            </div>

            {despesasMes.length === 0 && (
              <div style={{ textAlign: "center", color: "#334155", padding: "30px 0", fontSize: 13 }}>
                Nenhuma despesa registrada neste mês
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {despesasMes.map(d => (
                <div key={d.id} style={{
                  background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)",
                  borderRadius: 12, padding: "12px 16px",
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#e8f0fe" }}>{d.descricao}</div>
                    {d.data && <div style={{ fontSize: 11, color: "#64748b" }}>{d.data}</div>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 14, fontWeight: 900, color: "#ef4444" }}>-{fmt(d.valor)}</span>
                    {confirmDelete === d.id ? (
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => removerDespesa(d.id)} style={{
                          padding: "4px 10px", borderRadius: 8, border: "none", cursor: "pointer",
                          background: "#ef4444", color: "#fff", fontSize: 11, fontWeight: 700,
                        }}>Sim</button>
                        <button onClick={() => setConfirmDelete(null)} style={{
                          padding: "4px 10px", borderRadius: 8, border: "none", cursor: "pointer",
                          background: "rgba(255,255,255,0.1)", color: "#94a3b8", fontSize: 11,
                        }}>Não</button>
                      </div>
                    ) : (
                      <button onClick={() => setConfirmDelete(d.id)} style={{
                        padding: "4px 8px", borderRadius: 8, border: "none", cursor: "pointer",
                        background: "rgba(255,255,255,0.08)", color: "#64748b", fontSize: 12,
                      }}>🗑</button>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {despesasMes.length > 0 && (
              <div style={{
                marginTop: 16, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
                borderRadius: 12, padding: "12px 16px", display: "flex", justifyContent: "space-between",
              }}>
                <span style={{ fontWeight: 700, color: "#94a3b8" }}>Total despesas</span>
                <span style={{ fontWeight: 900, color: "#ef4444" }}>-{fmt(totalDespesas)}</span>
              </div>
            )}
          </div>
        )}

        {/* TAB: JOGADORES */}
        {tab === "jogadores" && (
          <div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
                Adicionar Jogador
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <input
                  placeholder="Nome do jogador"
                  value={novoJogadorInput}
                  onChange={e => setNovoJogadorInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && adicionarJogador()}
                  style={{
                    flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
                    borderRadius: 10, padding: "10px 14px", color: "#e8f0fe", fontSize: 13, outline: "none",
                  }}
                />
                <button onClick={adicionarJogador} style={{
                  padding: "10px 18px", borderRadius: 10, border: "none", cursor: "pointer",
                  background: "linear-gradient(135deg,#22c55e,#16a34a)", color: "#fff", fontSize: 14, fontWeight: 800,
                }}>+</button>
              </div>
            </div>

            <div style={{ fontSize: 12, color: "#64748b", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
              Elenco — {jogadores.length} jogadores
            </div>

            {/* Resumo anual por jogador */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {jogadores.map((nome, idx) => {
                const totalPagoAno = MESES.reduce((s, _, i) => {
                  const p = getPag(nome, i, anoAtivo);
                  return s + (p.pago ? (p.valor || MENSALIDADE) : 0);
                }, 0);
                const mesesPagos = MESES.filter((_, i) => getPag(nome, i, anoAtivo).pago).length;
                return (
                  <div key={nome} style={{
                    background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)",
                    borderRadius: 12, padding: "12px 16px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{
                        width: 34, height: 34, borderRadius: "50%",
                        background: "linear-gradient(135deg,rgba(34,197,94,0.3),rgba(22,163,74,0.15))",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 14, fontWeight: 900, color: "#22c55e",
                      }}>
                        {idx + 1}
                      </div>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#e8f0fe" }}>{nome}</div>
                        <div style={{ fontSize: 11, color: "#64748b" }}>{mesesPagos} meses pagos em {anoAtivo}</div>
                      </div>
                    </div>
